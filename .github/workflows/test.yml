name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish ripgrep

      - name: Run dotfiles tests
        run: bash tests/run.sh
