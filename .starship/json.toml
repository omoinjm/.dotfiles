# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Set 'foo' as custom color palette
# palette = "foo"

# # # Define custom colors
# [palettes.foo]

# # Overwrite existing color
# purple = "#7aa2f7"
# blue = "#7dcfff"
# grey = "#a0a9cb"  
# cyan = "#43CCEA"
# green = "#42E66C"
# red = "#ff0000"
# magenta = "#bb9af7"
# yellow = "#F1FA8C"

continuation_prompt = '[> ](fg:bright-black bg:transparent) '

command_timeout = 1000

format = """
[\u2B22 ](fg:#42E66C bg:transparent)\
$directory\
$git_branch\
[\u2630 ](fg:#43CCEA bg:transparent)\
$git_status\
[ \u25C9](fg:#ff0000 bg:transparent)\
    $fill\
    $nodejs\
    $c\
    $rust\
    $golang\
    $java\
    $php\
    $dotnet\
    $docker_context\
\n$shell \
"""

[character]
success_symbol = '[>](fg:bright-black)'
disabled = true

[fill]
symbol=" "
disabled = false

[memory_usage]
disabled = true
symbol = "ябЪ "
threshold = -1
format = " [$symbol$ram](#656555)"

[username]
show_always = false
format = "[$user](#656555)"

[hostname]
ssh_only = false
format = "[$hostname](#656555)"
disabled = true

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:transparent"
format = '[[ яР║ $time ](fg:#a0a9cb bg:#transparent)]($style)'

[directory]
style = "fg:#F1FA8C"
format = "[$path]($style) "
truncation_length = 1

[directory.substitutions]
"Documents" = "ґ░ИЩ "
"Downloads" = "яАЩ "
"Music" = "яАБ "
"Pictures" = "яА╛ "

[package]
symbol ="яТЗ "
display_private = false
version_format = "v${raw}"
format = "[$symbol$version](#67696B)"

[shell]
powershell_indicator = "яСа_ "
fish_indicator = "ЁЯРЯ"
cmd_indicator = "яСа_"
bash_indicator = "юпК"
zsh_indicator = "юпК"
disabled = false
style = "fg:bright-black"
format = "[$indicator]($style)"

#=== git ===

[git_branch]
symbol = "юВа"
style = "bg:transparent"
format = '[[$symbol $branch ](fg:#43CCEA bg:transparent)]($style)'

[git_status]
style = "(fg:#43CCEA bg:transparent)"
stashed = "\uf692 (${count}) "
ahead = "тЗб${count} "
behind = "тЗг${count} "
diverged = "тЗХ${ahead_count} ${behind_count} "
conflicted = "x${count} "
modified = "\uf044 ?(${count}) "
untracked = "~${count}] "
deleted = "-${count} "
renamed = "┬╗${count} "
typechanged = "==${count}"
staged = "\uf046 ${count} "
up_to_date = ""
format = '[[($all_status$ahead_behind )](fg:#43CCEA bg:transparent)]($style)'

#=== cloud ===
[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = 'ґ░аЕ '

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
symbol = 'юЮн  '
[aws.region_aliases]
ap-southeast-2 = 'au'
us-east-1 = 'va'
[aws.profile_aliases]
CompanyGroupFrobozzOnCallAccess = 'Frobozz'


#=== languages ===

[c]
symbol = "юШЮ "
style = "bg:transparent"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "яМИ "
style = "bg:transparent"
format = '[ $symbol $context ]($style)'

[java]
symbol = "юЙЦ "
style = "bg:transparent"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "\uf898"
style = "bg:transparent"
format = '[[ $symbol ($version) ](fg:#9ece6a)]($style)'

[rust]
symbol = "юЮи"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:transparent)]($style)'

[golang]
symbol = "\uFCD1"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:transparent)]($style)'

[php]
symbol = "\ue73d"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:transparent)]($style)'

[python]
symbol = "\uE235"
pyenv_prefix = 'pyenv '
python_binary = "python"
format = '[$symbol$pyenv_prefix$version(\($virtualenv\))](#cebdac)'

[dotnet]
symbol = "юШЮ  "
heuristic = true
# detect_extensions = "['csproj', 'fsproj', 'xproj']"
# detect_files = "['global.json', 'project.json', 'Directory.Build.props', 'Directory.Build.targets', 'Packages.props']"
style = "bg:transparent"
version_format = "v${raw}"
format = "via [$symbol($version)]($style)"
