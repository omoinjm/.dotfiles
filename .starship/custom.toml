command_timeout = 1000
add_newline = true

format = """
[в•ӯв”Җ](#5B5E61)\
    [ ](#cebdac)\
      $directory\
      $git_branch\
      $git_status\
      $fill\
      $nodejs\
      $dotnet\
      $python\
      $docker_context [ ](#cebdac)	
[в•°в”Җ](#5B5E61)\
    $shell"""

# color1="#656555"
# color2="#5B5E61"
# color3="#5E6265"
# color4="#67696B"
# color5="#BA593C"
# color7="#cebdac"

[fill]
symbol=" "

[memory_usage]
disabled = false
symbol = "пЎҡ "
threshold = -1
format = " [$symbol$ram](#656555)"


[username]
show_always = true
format = "[$user](#656555)"

[hostname]
ssh_only= false
format = "[$hostname](#656555)"
disabled = false

[docker_context]
symbol = "echo ' пҢҲ '"
format = "via [рҹҗӢ $context](blue bold)"

[character]
success_symbol = " [$shell\\$](#cebdac)"
error_symbol = " [$shell](#cebdac)"

[shell]
powershell_indicator = "п‘ _"
bash_indicator = "оҜҠ"
disabled= false


[time]
disabled = false
time_format = "%T"
format = "[ пҖ— $time](#BA593C)"
use_12hr = true

[directory]
disabled = false
read_only = "п Ҫ "
truncation_length = 1
truncation_symbol = " "
truncate_to_repo = false
format = "[$read_only](#67696B)[$path](#67696B) "
home_symbol = "пҖ•"

# [directory.substitution]
# "~" = "пҖ•"

[cmd_duration]
disabled = false
min_time = 2_000
show_milliseconds = true
show_notifications = false
min_time_to_notify = 45_000
format = "[ пЁҡ $duration](#5E6265) "

[git_status]
stashed = "пҖң \\(${count}\\) "
ahead = "вҮЎ${count} "
behind = "вҮЈ${count} "
diverged = "п§Ў${ahead_count} ${behind_count} "
conflicted = "рҹҸі${count} "
deleted = "[рҹ—‘${count}](#5E6265) "
renamed = "В»${count} "
modified = "[рҹ“қ\\(${count}\\) ](#5E6265) "
staged = "[\uf046 ${count}](#5E6265) "
untracked = "пҗҺ \\(${count}\\) "
up_to_date = "вң“"
format = "([$all_status$ahead_behind](#5E6265)) "

[git_branch]
# symbol = "пһЎ "
symbol = "оӮ "
truncation_length = 20
always_show_remote = false
format = "[$symbol$branch(:$remote_branch)](#cebdac) "

[package]
symbol ="п’Ү "
display_private = true
version_format = "v${raw}"
format = "[$symbol$version](#67696B)"

#=== languages ===

[nodejs]
symbol = " пўҳ "
format = "[$symbol($version)](#cebdac)"

[python]
symbol = " оҳҶ "
pyenv_prefix = 'pyenv '
python_binary = "python"
format = '[$symbol$pyenv_prefix$version(\($virtualenv\))](#cebdac)'

[dotnet]
symbol = ".NET "
style = "green"
heuristic = true
# detect_extensions = "['csproj', 'fsproj', 'xproj']"
# detect_files = "['global.json', 'project.json', 'Directory.Build.props', 'Directory.Build.targets', 'Packages.props']"
version_format = "v${raw}"
format = "via [$symbol($version)]($style)"
