# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Set 'foo' as custom color palette
# palette = "foo"

# # # Define custom colors
# [palettes.foo]

# # Overwrite existing color
# purple = "#7aa2f7"
# blue = "#7dcfff"
# grey = "#a0a9cb"  
# cyan = "#67696B"
# green = "#9ece6a"
# red = "#f7768e"
# magenta = "bb9af7"

continuation_prompt = '[Ô×£ ](fg:#7aa2f7 bg:transparent) '

format = """
[Ô×£ ](fg:#7aa2f7 bg:transparent)\
$directory\
[ \u26a1](fg:#7dcfff bg:transparent)\
$git_branch\
[\u2630 ](fg:#7dcfff bg:transparent)\
$git_status\
    $fill\
    $nodejs\
    $c\
    $rust\
    $golang\
    $java\
    $php\
    $dotnet\
    $docker_context\
    $time\
\n$shell \
"""

[character]
success_symbol = '[Ô×£](fg:#7aa2f7)'
disabled = true

[fill]
symbol=" "
disabled = false

[memory_usage]
disabled = true
symbol = "´íÜ "
threshold = -1
format = " [$symbol$ram](#656555)"

[username]
show_always = false
format = "[$user](#656555)"

[hostname]
ssh_only = false
format = "[$hostname](#656555)"
disabled = true

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:transparent"
format = '[[ ´É║ $time ](fg:#a0a9cb bg:#transparent)]($style)'

[directory]
style = "fg:#bb9af7"
format = "[$path]($style)"
truncation_length = 1

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[package]
symbol ="´Æç "
display_private = false
version_format = "v${raw}"
format = "[$symbol$version](#67696B)"

[shell]
powershell_indicator = "´æá_ "
fish_indicator = "­ƒÉƒ"
cmd_indicator = "´æá_"
bash_indicator = "¯»è"
zsh_indicator = "¯»è"
disabled = false
style = "fg:#9ece6a"
format = "[$indicator]($style)"

#=== git ===

[git_branch]
symbol = "´Éÿ"
style = "bg:transparent"
format = '[[$symbol $branch ](fg:#7dcfff bg:transparent)]($style)'

[git_status]
style = "bg:transparent"
stashed = "\uf692 (${count}) "
ahead = "Ôçí${count} "
behind = "Ôçú${count} "
diverged = "Ôçò${ahead_count} ${behind_count} "
conflicted = "=${count} "
modified = "[\uf044 ?(${count})](fg:#f7768e bg:transparent) "
untracked = "[~${count}](fg:#f7768e bg:transparent)"
deleted = "[-${count}](fg:#f7768e bg:transparent) "
renamed = "┬╗${count} "
staged = "[\u26a1 ${count}](fg:#f7768e bg:transparent) "
up_to_date = ""
format = '[[($all_status$ahead_behind )](fg:##f7768e bg:transparent)]($style)'

#=== cloud ===
[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '¾░áà '

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
symbol = '¯×¡  '
[aws.region_aliases]
ap-southeast-2 = 'au'
us-east-1 = 'va'
[aws.profile_aliases]
CompanyGroupFrobozzOnCallAccess = 'Frobozz'


#=== languages ===

[c]
symbol = "¯ÿ× "
style = "bg:transparent"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "´îê "
style = "bg:transparent"
format = '[ $symbol $context ]($style)'

[java]
symbol = "¯ëû "
style = "bg:transparent"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "\uf898"
style = "bg:transparent"
format = '[[ $symbol ($version) ](fg:#9ece6a)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:transparent)]($style)'

[golang]
symbol = "\uFCD1"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:transparent)]($style)'

[php]
symbol = "\ue73d"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:transparent)]($style)'

[python]
symbol = "\uE235"
pyenv_prefix = 'pyenv '
python_binary = "python"
format = '[$symbol$pyenv_prefix$version(\($virtualenv\))](#cebdac)'

[dotnet]
symbol = "¯ÿ×  "
heuristic = true
# detect_extensions = "['csproj', 'fsproj', 'xproj']"
# detect_files = "['global.json', 'project.json', 'Directory.Build.props', 'Directory.Build.targets', 'Packages.props']"
style = "bg:transparent"
version_format = "v${raw}"
format = "via [$symbol($version)]($style)"